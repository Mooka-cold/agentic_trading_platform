name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Use the repository name as the image prefix
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Downcase Image Name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build & Push Backend ---
      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest

      # --- Build & Push AI Engine ---
      - name: Build and push AI Engine image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./ai_engine/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ai-engine:latest

      # --- Build & Push Frontend (Optional for Hybrid, but good for backup) ---
      # For Hybrid mode, you run frontend locally, so we can skip pushing frontend image 
      # to save build time, or keep it for full deployment later.
      # Let's keep it but comment out if you want faster builds.
      - name: Build and push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (for docker-compose.prod.yml)
        uses: actions/checkout@v3

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/ai_trading/"

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/ai_trading
            
            # 1. Login to GHCR on server
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. Create .env file from GitHub Secrets (Overwrite existing)
            # This ensures secrets are securely injected and persisted for compose
            cat <<EOF > .env
            IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}
            
            # API Keys
            CRYPTOPANIC_API_KEY=${{ secrets.CRYPTOPANIC_API_KEY }}
            NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            
            # Database Passwords (Injection)
            POSTGRES_USER_PASSWORD=${{ secrets.POSTGRES_USER_PASSWORD }}
            POSTGRES_MARKET_PASSWORD=${{ secrets.POSTGRES_MARKET_PASSWORD }}
            EOF
            
            # 3. Pull latest images
            docker compose -f docker-compose.prod.yml pull
            
            # 4. Restart services
            # The .env file created above will be automatically read by docker compose
            docker compose -f docker-compose.prod.yml up -d
            
            # 5. Clean up old images
            docker image prune -f
