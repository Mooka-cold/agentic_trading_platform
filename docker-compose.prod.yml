version: '3.8'

services:
  # --- Databases ---
  db-users:
    image: postgres:15-alpine
    container_name: ai_trading-db-users
    restart: always
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: ${POSTGRES_USER_PASSWORD:-user_password}
      POSTGRES_DB: ai_trading_users
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - ai_trading_net
    # Ports exposed only if needed for external debugging, otherwise keep internal for security
    # ports:
    #   - "3205:5432"

  db-market:
    image: timescale/timescaledb:latest-pg15
    container_name: ai_trading-db-market
    restart: always
    environment:
      POSTGRES_USER: market_admin
      POSTGRES_PASSWORD: ${POSTGRES_MARKET_PASSWORD:-market_password}
      POSTGRES_DB: ai_trading_market
    volumes:
      - timescale_market_data:/var/lib/postgresql/data
      - ./init/market_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ai_trading_net
    # ports:
    #   - "3206:5432"

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - ai_trading_net

  redis:
    image: redis:alpine
    restart: always
    networks:
      - ai_trading_net

  # --- Application Services ---
  backend:
    image: ${IMAGE_PREFIX}/backend:latest
    container_name: ai_trading-backend
    restart: always
    ports:
      - "3201:8000"
    environment:
      - DATABASE_USER_URL=postgresql://user_admin:${POSTGRES_USER_PASSWORD:-user_password}@db-users:5432/ai_trading_users
      - DATABASE_MARKET_URL=postgresql://market_admin:${POSTGRES_MARKET_PASSWORD:-market_password}@db-market:5432/ai_trading_market
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_URL=http://chromadb:8000
      - CRYPTOPANIC_API_KEY=${CRYPTOPANIC_API_KEY}
      - NEWS_API_KEY=${NEWS_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    depends_on:
      - db-users
      - db-market
      - redis
    networks:
      - ai_trading_net

  ai-engine:
    image: ${IMAGE_PREFIX}/ai-engine:latest
    container_name: ai_trading-ai-engine
    restart: always
    ports:
      - "3202:8000"
    environment:
      - DATABASE_USER_URL=postgresql://user_admin:${POSTGRES_USER_PASSWORD:-user_password}@db-users:5432/ai_trading_users
      - DATABASE_MARKET_URL=postgresql://market_admin:${POSTGRES_MARKET_PASSWORD:-market_password}@db-market:5432/ai_trading_market
      - REDIS_URL=redis://redis:6379/0
      - CRYPTOPANIC_API_KEY=${CRYPTOPANIC_API_KEY}
      - BACKEND_URL=http://backend:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    depends_on:
      - db-users
      - db-market
      - redis
    networks:
      - ai_trading_net

  scheduler:
    image: ${IMAGE_PREFIX}/scheduler:latest
    container_name: ai_trading-scheduler
    restart: always
    command: python main.py
    environment:
      - BACKEND_URL=http://backend:8000
      - AI_ENGINE_URL=http://ai-engine:8000
      - SCHEDULE_SYMBOLS=BTC/USDT,ETH/USDT,SOL/USDT,BNB/USDT,XRP/USDT
    depends_on:
      - backend
      - ai-engine
    networks:
      - ai_trading_net

  market-streamer:
    image: ${IMAGE_PREFIX}/backend:latest
    container_name: ai_trading-market-streamer
    restart: always
    command: python -m app.services.streamer.main
    environment:
      - DATABASE_USER_URL=postgresql://user_admin:${POSTGRES_USER_PASSWORD:-user_password}@db-users:5432/ai_trading_users
      - DATABASE_MARKET_URL=postgresql://market_admin:${POSTGRES_MARKET_PASSWORD:-market_password}@db-market:5432/ai_trading_market
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db-market
      - redis
    networks:
      - ai_trading_net

networks:
  ai_trading_net:
    driver: bridge

volumes:
  postgres_user_data:
  timescale_market_data:
  chroma_data:
