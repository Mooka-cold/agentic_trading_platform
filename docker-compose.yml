services:
  # User & Strategy Database (PostgreSQL)
  db-users:
    image: postgres:15-alpine
    container_name: ai_trading-db-users
    restart: always
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: user_password
      POSTGRES_DB: ai_trading_users
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    ports:
      - "3205:5432"
    networks:
      - ai_trading_net

  # Market Data Time-Series Database (TimescaleDB)
  db-market:
    image: timescale/timescaledb:latest-pg15
    container_name: ai_trading-db-market
    restart: always
    environment:
      POSTGRES_USER: market_admin
      POSTGRES_PASSWORD: market_password
      POSTGRES_DB: ai_trading_market
    volumes:
      - timescale_market_data:/var/lib/postgresql/data
      - ./docker/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3206:5432"
    networks:
      - ai_trading_net

  # Vector Database for News/RAG (ChromaDB)
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "3203:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - ai_trading_net

  # Cache & Message Broker (Redis)
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "3204:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ai_trading_net

  # Backend API (FastAPI)
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3201:8000"
    environment:
      - DATABASE_USER_URL=postgresql://user_admin:user_password@db-users:5432/ai_trading_users
      - DATABASE_MARKET_URL=postgresql://market_admin:market_password@db-market:5432/ai_trading_market
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_URL=http://chromadb:8000
      - AI_ENGINE_URL=http://ai-engine:8000
      - CRYPTOPANIC_API_KEY=${CRYPTOPANIC_API_KEY}
      - NEWS_API_KEY=${NEWS_API_KEY}
      - PYTHONPATH=/app:/app/shared
    depends_on:
      - db-users
      - db-market
      - redis
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
    networks:
      - ai_trading_net

  # AI Engine (Strategy Worker)
  ai-engine:
    build:
      context: .
      dockerfile: ai_engine/Dockerfile
    ports:
      - "3202:8000"
    environment:
      - DATABASE_USER_URL=postgresql://user_admin:user_password@db-users:5432/ai_trading_users
      - DATABASE_MARKET_URL=postgresql://market_admin:market_password@db-market:5432/ai_trading_market
      - REDIS_URL=redis://redis:6379/0
      - CRYPTOPANIC_API_KEY=${CRYPTOPANIC_API_KEY}
      - BACKEND_URL=http://backend:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=https://dashscope.aliyuncs.com/compatible-mode/v1
      - LLM_MODEL=qwen-plus
      - PYTHONPATH=/app:/app/shared
    depends_on:
      - db-users
      - db-market
      - redis
    volumes:
      - ./ai_engine:/app
      - ./shared:/app/shared
    networks:
      - ai_trading_net

  crawler:
    build:
      context: .
      dockerfile: crawler/Dockerfile
    ports:
      - "3207:8000"
    environment:
      - DATABASE_USER_URL=postgresql://user_admin:user_password@db-users:5432/ai_trading_users
      - DATABASE_MARKET_URL=postgresql://market_admin:market_password@db-market:5432/ai_trading_market
      - REDIS_URL=redis://redis:6379/0
      - NEWS_API_KEY=${NEWS_API_KEY}
      - CRYPTOPANIC_API_KEY=${CRYPTOPANIC_API_KEY}
      - SCHEDULE_SYMBOLS=BTC/USDT,ETH/USDT,SOL/USDT,BNB/USDT,XRP/USDT
      - PYTHONPATH=/app:/app/shared
    depends_on:
      - db-users
      - db-market
    volumes:
      - ./crawler:/app
      - ./shared:/app/shared
    networks:
      - ai_trading_net

  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    command: python main.py
    environment:
      - BACKEND_URL=http://backend:8000
      - AI_ENGINE_URL=http://ai-engine:8000
      - CRAWLER_URL=http://crawler:8000
      - SCHEDULE_SYMBOLS=BTC/USDT,ETH/USDT,SOL/USDT,BNB/USDT,XRP/USDT
      - DATABASE_USER_URL=postgresql://user_admin:user_password@db-users:5432/ai_trading_users
      - DATABASE_MARKET_URL=postgresql://market_admin:market_password@db-market:5432/ai_trading_market
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app:/app/shared
    depends_on:
      - backend
      - ai-engine
      - crawler
    volumes:
      - ./scheduler:/app
      - ./shared:/app/shared
    networks:
      - ai_trading_net

  market-streamer:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python -m app.services.streamer.main
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
    environment:
      - DATABASE_USER_URL=postgresql://user_admin:user_password@db-users:5432/ai_trading_users
      - DATABASE_MARKET_URL=postgresql://market_admin:market_password@db-market:5432/ai_trading_market
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app:/app/shared
    depends_on:
      - db-market
      - redis
    restart: always
    networks:
      - ai_trading_net

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3200:3200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      # Browser-side access (User's browser -> Backend Public URL)
      # In local dev: http://localhost:3201
      # In cloud: http://<PUBLIC_IP>:3201
      - NEXT_PUBLIC_API_URL=http://localhost:3201
      
      # Server-side access (Next.js Container -> AI Engine Container)
      # Always use internal Docker DNS name
      - AI_ENGINE_URL=http://ai-engine:8000
    networks:
      - ai_trading_net

networks:
  ai_trading_net:
    driver: bridge

volumes:
  postgres_user_data:
  timescale_market_data:
  chroma_data:
  redis_data:
